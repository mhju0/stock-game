name: keepalive

# Prevents Supabase free-tier 7-day inactivity pause (and warms the Render
# instance) by hitting an endpoint that runs a real DB query. Runs every 3 days.
on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health/db
        run: |
          curl --fail --show-error --silent \
            --retry 3 --retry-delay 30 --retry-all-errors \
            --max-time 120 \
            https://stock-game-6411.onrender.com/health/db
