<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0d0d0d"/>
  <!-- Basquiat Three-Pointed Crown -->
  <path d="M20 72 L20 38 L35 52 L50 26 L65 52 L80 38 L80 72 Z"
        fill="none" stroke="#FFD23F" stroke-width="5"
        stroke-linejoin="miter" stroke-linecap="square"
        paint-order="stroke"/>
  <!-- Crown point dots -->
  <circle cx="20" cy="34" r="4" fill="#FFD23F"/>
  <circle cx="50" cy="22" r="4" fill="#FFD23F"/>
  <circle cx="80" cy="34" r="4" fill="#FFD23F"/>
  <!-- Horizontal red scratch -->
  <line x1="28" y1="58" x2="72" y2="58" stroke="#FF3131" stroke-width="3" stroke-linecap="square"/>
  <!-- Copyright mark -->
  <text x="82" y="88" font-family="monospace" font-size="14" fill="#FFD23F" opacity="0.5">©</text>
</svg>
