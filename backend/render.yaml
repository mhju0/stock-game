services:
  - type: web
    name: stock-game-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      # Must be set in the Render dashboard (Supabase Postgres URL). Declared
      # here so re-provisioning from this blueprint fails loudly instead of
      # silently falling back to an ephemeral SQLite file.
      - key: DATABASE_URL
        sync: false
